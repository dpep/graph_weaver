query($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    id
    nameWithOwner
    stargazerCount
    stargazers(first: $first, orderBy: { field: STARRED_AT, direction: DESC }) {
      edges {
        starredAt
        node {
          login
          name
          repositories(first: 2, orderBy: { field: STARGAZERS, direction: DESC }) {
            nodes {
              nameWithOwner
              stargazerCount
            }
          }
        }
      }
    }
  }
}
